name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/sync_agent_layouts.py --check
      - run: >-
          python -m pytest
          tests/anime tests/unit tests/integration tests/property tests/packaging
          tests/e2e/test_e2e_mock.py tests/test_phase_11.py
          -o addopts='' -q

  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: >-
          ruff check
          src/krita_anime src/krita_client/anime_models.py src/krita_mcp/server.py
          tests/anime tests/packaging scripts/smoke_krita.py scripts/krita_runner_smoke.py
          scripts/install_agent_skill.py scripts/sync_agent_layouts.py
          krita-plugin/kritamcp/anime.py krita-plugin/kritamcp/qt_compat.py
      - run: python -m build
